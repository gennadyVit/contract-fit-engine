name: Build and deploy Streamlit UI to Azure Web App - govcontract-ui

on:
  push:
    branches:
      - main
    paths:
      - "streamlit/**"
      - "requirements-streamlit.txt"
      - "startup-streamlit.sh"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'govcontract-ui'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_UI }}
          package: .
