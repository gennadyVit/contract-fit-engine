name: Build and deploy Streamlit UI to Azure Web App - govcontract-ui

on:
  push:
    branches:
      - main
    paths:
      - "streamlit/**"
      - "requirements-streamlit.txt"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: govcontractacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: streamlit/Dockerfile
          push: true
          tags: govcontractacr.azurecr.io/govcontract-ui:latest

      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'govcontract-ui'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_UI }}
          images: 'govcontractacr.azurecr.io/govcontract-ui:latest'
